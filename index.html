<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>双盲诗歌 Pro</title><link rel="stylesheet" href="poem2_styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body><div class="wrap"><div class="topbar"><div><div class="title">双盲诗歌 Pro</div><div class="subtitle">两个人进入同一房间，轮流各写一句。在揭晓前，谁也看不到对方写的内容。</div></div><div class="nav"><a href="gallery.html">作品广场</a><a href="ranking.html">排行榜</a></div></div><div class="notice">这版已拆成多页面。首页负责创建/加入房间，作品广场与排行榜是独立页面，手机浏览器可以直接使用系统返回或左滑返回。</div><div class="card"><div class="row"><div><label>SUPABASE_URL</label><input id="supabaseUrl" placeholder="https://xxx.supabase.co"></div><div><label>SUPABASE_ANON_KEY</label><input id="supabaseAnonKey" placeholder="sb_publishable_xxx"></div></div><div style="margin-top:14px"><button class="btn-secondary" onclick="saveConfigFromPage()">保存配置到本地</button></div><div class="footer-note">第一次使用时填写，之后会保存在浏览器本地。</div></div><div class="card"><label>昵称</label><input id="nickname" placeholder="请输入昵称"><div class="row" style="margin-top:14px"><button class="btn-primary" onclick="createRoomPage()">创建房间</button><div style="display:flex; gap:10px"><input id="joinCode" placeholder="输入邀请码"><button class="btn-secondary" onclick="joinRoomPage()">加入房间</button></div></div><div class="row" style="margin-top:14px"><div><label>主题</label><input id="themeInput" value="自由创作"></div><div><label>总轮数</label><select id="totalRounds"><option value="2">2 轮</option><option value="4" selected>4 轮</option><option value="6">6 轮</option></select></div></div><div class="row" style="margin-top:14px"><div><label>公布方式</label><select id="revealMode"><option value="final" selected>最终统一公布</option><option value="round">每轮完成后立即公布这一轮</option></select></div><div><label>房主书写部分</label><select id="linePosition"><option value="upper" selected>上半句</option><option value="lower">下半句</option></select></div></div></div><div class="footer-note">若同伴误退出，请使用原昵称重新加入同一房间，系统会优先识别为原成员。</div></div><script src="poem2_app.js"></script><script>hydrateIndex();</script></body></html>
