<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>房间 - 双盲诗歌 Pro</title><link rel="stylesheet" href="poem2_styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body><div class="wrap" id="main"><div class="topbar"><div><div class="title">双盲诗歌 Pro</div><div class="subtitle">房间页。支持再来一局、独立发布、主题二次修改。</div></div><div class="nav"><a href="index.html">首页</a><a href="gallery.html">作品广场</a><a href="ranking.html">排行榜</a><button class="btn-danger" onclick="roomLeave()">退出房间</button></div></div><div class="card"><div class="topbar"><div><div class="small">房间邀请码</div><div class="code" id="roomCode">-</div></div><button class="btn-secondary" onclick="roomRefresh()">刷新状态</button></div><div><span class="pill" id="playerRole">身份：-</span><span class="pill" id="playerPosition">书写部分：-</span><span class="pill" id="roundInfo">第 1 / 4 轮</span><span class="pill" id="roomStatus">状态：-</span><span class="pill" id="revealModeInfo">公布方式：-</span></div><div class="small" id="playersInfo" style="margin-top:8px">当前房间成员：-</div><div class="small" id="themeInfo" style="margin-top:6px">主题：-</div></div><div class="card hidden" id="recoverCard"><div class="center"><div style="font-size:24px;font-weight:800;margin-bottom:10px">未识别到你的席位</div><div class="subtitle" style="margin-bottom:10px">如果你是误退出的原成员，请回首页使用原昵称重新加入该房间。</div><a class="nav active" href="index.html">返回首页</a></div></div><div class="card hidden" id="writeCard"><div style="font-size:22px;font-weight:800;margin-bottom:6px">写一句</div><div class="subtitle" id="writeHint">你现在写上半句。</div><textarea id="lineInput" maxlength="80" placeholder="请输入这一轮的内容（80 字以内）"></textarea><div class="like-row"><div id="submitStatus" class="small"></div><button class="btn-primary" onclick="roomSubmitLine()">提交这一轮</button></div></div><div class="card hidden center" id="waitingCard"><div style="font-size:22px;font-weight:800;margin-bottom:8px">等待中</div><div class="subtitle" id="waitingText">等待对方加入…</div></div><div class="card hidden" id="roundRevealCard"><div class="topbar"><div><div style="font-size:22px;font-weight:800">本轮公布</div><div class="small" id="roundRevealMeta">第 1 轮</div></div><button class="btn-primary" id="nextRoundBtn" onclick="roomNextRound()">进入下一轮</button></div><div class="poem-box" id="roundRevealText"></div></div><div class="card hidden" id="finalCard"><div class="topbar"><div style="font-size:22px;font-weight:800">总揭晓</div><div style="display:flex; gap:10px; flex-wrap:wrap"><button class="btn-secondary" onclick="roomRestart()">再来一局</button></div></div><div class="row"><div><label>交错合成版</label><div class="poem-box" id="mixedPoem"></div></div><div><label>A 的内容</label><div class="poem-box" id="poemA"></div></div></div><div style="margin-top:14px"><label>B 的内容</label><div class="poem-box" id="poemB"></div></div><div class="card" style="margin-top:16px; margin-bottom:0"><div style="font-size:20px;font-weight:800;margin-bottom:10px">发布到作品广场</div><div class="row"><div><label>发布题目（允许修改）</label><input id="publishTheme" placeholder="请输入最终发布题目"></div><div style="display:flex;align-items:end"><button class="btn-primary" onclick="roomPublishPoem()">发布作品</button></div></div><div id="publishStatus" class="small" style="margin-top:10px"></div></div></div><div class="footer-note">建议通过微信直接分享房间页链接给同学使用。</div></div><script src="poem2_app.js"></script><script>hydrateRoomPage();</script></body></html>
